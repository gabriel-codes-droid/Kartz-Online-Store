<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Kartz — Art Marketplace</title>

  <!-- Firebase compat SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <style>
    :root {
      --bg1: #030303;
      --bg2: #070707;
      --cyan: #00ffff; /* brighter, more electric cyan */
      --muted: #9da1a5;
      --glow-opacity: 0.55; /* increased glow intensity */
      --glow-color: rgba(0,255,255,var(--glow-opacity));
    }

    *{box-sizing:border-box;}
    body{
      background: radial-gradient(circle at top, var(--bg1), var(--bg2));
      color:#fff;
      font-family:'Poppins',sans-serif;
      margin:0;
      min-height:100vh;
    }

    header{
      position:sticky;top:0;
      background:rgba(0,0,0,0.85);
      backdrop-filter:blur(6px);
      padding:15px;
      border-bottom:1px solid rgba(0,255,255,0.15);
      display:flex;align-items:center;justify-content:space-between;
      box-shadow:0 0 15px rgba(0,255,255,0.1);
    }

    header h1{
      color:var(--cyan);
      margin:0;
      font-size:1.7em;
      text-shadow:0 0 8px var(--glow-color), 0 0 16px rgba(0,255,255,0.25);
    }

    nav button{
      background:transparent;
      border:1px solid rgba(0,255,255,0.4);
      color:#fff;
      margin-left:8px;
      border-radius:8px;
      padding:8px 12px;
      cursor:pointer;
      transition:0.25s;
      font-weight:500;
    }

    nav button:hover{
      background:rgba(0,255,255,0.1);
      box-shadow:0 0 10px var(--glow-color);
      transform:translateY(-2px);
    }

    .wrap{
      max-width:1000px;
      margin:20px auto;
      padding:0 16px;
    }

    .panel{
      background:#0d0d0f;
      border:1px solid rgba(0,255,255,0.1);
      border-radius:10px;
      padding:22px;
      margin-top:22px;
      box-shadow:0 0 18px rgba(0,255,255,0.06);
    }

    h2{
      color:var(--cyan);
      text-shadow:0 0 6px rgba(0,255,255,0.3);
    }

    .btn{
      background:linear-gradient(180deg,#0b0b0d,#121215);
      border:1px solid rgba(0,255,255,0.4);
      color:#fff;
      border-radius:8px;
      padding:10px 16px;
      cursor:pointer;
      transition:0.3s;
      width:100%;
      margin-top:8px;
      font-weight:600;
      letter-spacing:0.3px;
    }

    .btn:hover{
      background:rgba(0,255,255,0.1);
      box-shadow:0 0 14px var(--glow-color);
      transform:translateY(-2px);
    }

    input,textarea{
      width:100%;
      margin-top:8px;
      padding:10px;
      border-radius:6px;
      border:1px solid rgba(0,255,255,0.2);
      background:#111;
      color:#fff;
      transition:box-shadow 0.2s;
    }

    input:focus, textarea:focus{
      box-shadow:0 0 10px rgba(0,255,255,0.3);
      border-color:rgba(0,255,255,0.5);
      outline:none;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:18px;
      margin-top:16px;
    }

    .card{
      background:#111;
      border-radius:10px;
      overflow:hidden;
      border:1px solid rgba(0,255,255,0.1);
      transition:transform .25s, box-shadow .25s;
    }

    .card:hover{
      transform:translateY(-6px);
      box-shadow:0 0 18px rgba(0,255,255,0.25);
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
      border-bottom:1px solid rgba(0,255,255,0.1);
    }

    .card .pad{padding:10px;}
    .title{color:var(--cyan);font-weight:600;text-shadow:0 0 6px rgba(0,255,255,0.25);}
    .price{color:var(--cyan);font-weight:700;}
    footer{text-align:center;padding:20px;margin-top:40px;color:#888;border-top:1px solid rgba(0,255,255,0.1);}
    .hide{display:none;}
  </style>
</head>
<body>
  <header>
    <h1>🎨 Kartz</h1>
    <nav>
      <button onclick="show('home')">Home</button>
      <button onclick="show('explore');loadAllArt()">Explore</button>
      <button onclick="show('upload')">Upload</button>
      <button onclick="show('auth')">Login</button>
    </nav>
  </header>

  <main class="wrap">
    <!-- Home -->
    <section id="home" class="panel">
      <h2>Welcome to Kartz</h2>
      <p>Discover, buy, and sell amazing artwork by independent artists. Support creativity and collect art that inspires you.</p>
      <button class="btn" onclick="show('explore');loadAllArt()">Explore Art</button>
    </section>

    <!-- Explore -->
    <section id="explore" class="panel hide">
      <h2>Explore Artworks</h2>
      <input id="searchBox" placeholder="Search artworks..." />
      <button class="btn" onclick="searchArt()">Search</button>
      <div id="artGrid" class="grid"></div>
    </section>

    <!-- Upload -->
    <section id="upload" class="panel hide">
      <h2>Upload Your Art</h2>
      <input id="uTitle" placeholder="Title" />
      <input id="uPrice" type="number" placeholder="Price (USD)" />
      <input id="uImg" placeholder="Image URL" />
      <textarea id="uDesc" rows="3" placeholder="Short description"></textarea>
      <button class="btn" onclick="uploadArt()">Upload</button>
    </section>

    <!-- Auth -->
    <section id="auth" class="panel hide">
      <h2>Login or Sign Up</h2>
      <input id="email" type="email" placeholder="Email" />
      <input id="password" type="password" placeholder="Password" />
      <button class="btn" onclick="login()">Login</button>
      <button class="btn" onclick="signup()">Sign Up</button>
      <button class="btn" onclick="resetPassword()">Forgot Password?</button>
    </section>

    <footer>© 2025 Kartz | Built with 💙 and cyan glow for artists</footer>
  </main>

    function $(id){return document.getElementById(id);}
    function show(id){["home","explore","upload","auth"].forEach(s=>$(s).classList.add("hide"));$(id).classList.remove("hide");window.scrollTo(0,0);}

    async function loadAllArt(){
      const grid = $("artGrid");
      grid.innerHTML = "";
      try{
        const snap = await db.collection("art").orderBy("createdAt","desc").get();
        if(snap.empty) renderArt(demoArt);
        else {
          const art = []; snap.forEach(doc=>art.push(doc.data()));
          renderArt(art);
        }
      }catch(e){console.warn("Firestore failed, showing demo art", e);renderArt(demoArt);}
    }

    function renderArt(list){
      $("artGrid").innerHTML = list.map(a=>`
        <div class="card">
          <img src="${a.image}" alt="${a.title}"/>
          <div class="pad">
            <div class="title">${a.title}</div>
            <div>${a.description}</div>
            <div class="price">$${a.price}</div>
            <button class="btn" onclick="buyArt('${a.title}',${a.price})">Buy</button>
          </div>
        </div>
      `).join("");
    }

    async function uploadArt(){
      const user = auth.currentUser;
      if(!user) return alert("Login first");
      const art = {
        title:$("uTitle").value,
        price:parseFloat($("uPrice").value),
        image:$("uImg").value,
        description:$("uDesc").value,
        createdAt:firebase.firestore.FieldValue.serverTimestamp(),
        seller:user.email
      };
      await db.collection("art").add(art);
      alert("Art uploaded!");
      show("explore");loadAllArt();
    }

    async function login(){
      try{
        await auth.signInWithEmailAndPassword($("email").value,$("password").value);
        alert("Logged in!");
        show("explore");loadAllArt();
      }catch(e){alert(e.message);}
    }

    async function signup(){
      try{
        await auth.createUserWithEmailAndPassword($("email").value,$("password").value);
        alert("Account created!");
        show("explore");loadAllArt();
      }catch(e){alert(e.message);}
    }

    async function resetPassword(){
      const email = prompt("Enter your email to reset password:");
      if(!email) return;
      try{
        await auth.sendPasswordResetEmail(email);
        alert("Password reset email sent!");
      }catch(e){alert(e.message);}
    }

    function buyArt(title, price){
      alert(`Ready to buy "${title}" for $${price}.\nFlutterwave integration coming soon.`);
    }

    show("home");
  </script>
