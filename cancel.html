<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Payment Cancelled — Kartz</title>
  <style>
    :root {--bg-1:#030303;--bg-2:#070707;--cyan:#00f0ff;--muted:#99a0a6;}
    body {
      margin:0;height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;
      background:radial-gradient(circle at top,var(--bg-1),var(--bg-2));
      color:#fff;font-family:Inter, Poppins, system-ui;text-align:center;
    }
    .box {
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:12px;padding:30px 40px;
      box-shadow:0 0 15px rgba(0,240,255,0.1);
    }
    h1 {color:#ff7070;}
    p {color:var(--muted);}
    .btn {background:linear-gradient(180deg,#0b0b0d,#121215);color:#fff;border:none;border-radius:8px;padding:10px 18px;margin-top:20px;cursor:pointer;}
    .btn:hover{box-shadow:0 0 8px rgba(0,240,255,0.3);transform:translateY(-3px);}
  </style>
</head>
<body>
  <div class="box">
    <h1>❌ Payment Cancelled</h1>
    <p>Your payment was cancelled. You can try again anytime.</p>
    <button class="btn" onclick="window.location.href='index.html'">Return to Home</button>
  </div>
</body>
</html>
